<style>
  :root{--teal:#0E6E6E;--dteal:#0A5757;--cream:#FBF7EF;--accent:#D94F45;--dark:#1F2937;--gray:#6B7280;--lteal:#E3F1F1;--green:#0E9E6E;--amber:#B26A00;--line:#E7E5E0;--bg:#F2F1EC;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:#1b2430;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  .stage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .phone{width:390px;height:800px;max-height:96vh;background:var(--bg);border-radius:42px;overflow:hidden;position:relative;box-shadow:0 30px 70px rgba(0,0,0,.45);border:10px solid #0c0f14;display:flex;flex-direction:column;color:var(--dark);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#0c0f14;border-radius:0 0 18px 18px;z-index:50;}
  header{background:linear-gradient(135deg,var(--teal),var(--dteal));color:#fff;padding:34px 18px 14px;flex:none;}
  .brand{font-size:12px;letter-spacing:2px;opacity:.85;font-weight:700;text-transform:uppercase;}
  .h-row{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .h-title{font-size:22px;font-weight:800;}
  .gear{background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:12px;font-size:18px;cursor:pointer;}
  .month{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px;font-weight:700;font-size:15px;}
  .month button{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:10px;font-size:16px;cursor:pointer;}
  .homechip{display:block;width:100%;margin-top:12px;background:rgba(255,255,255,.14);border:none;color:#fff;font-weight:700;font-size:14px;padding:11px;border-radius:12px;cursor:pointer;}
  main{flex:1;overflow-y:auto;padding:16px 16px 92px;}
  .banner{background:#FFF3E0;color:#8a5a00;font-size:12px;font-weight:600;text-align:center;padding:7px 10px;}
  .card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.04);}
  .card h3{margin:0 0 12px;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--gray);}
  .big{font-size:34px;font-weight:800;letter-spacing:-.5px;}
  .sub{color:var(--gray);font-size:13px;margin-top:2px;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .cat-name{font-weight:600;font-size:15px;}
  .cat-meta{font-size:12px;color:var(--gray);margin-top:2px;}
  .amt{font-weight:700;font-size:15px;text-align:right;}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .under{background:#E6F6EF;color:var(--green);}
  .over{background:#FBE7E5;color:var(--accent);}
  .chip{border:none;cursor:pointer;font-size:12px;font-weight:800;padding:7px 13px;border-radius:20px;white-space:nowrap;}
  .chip.paid{background:#E6F6EF;color:var(--green);}
  .chip.due{background:#FFF3E0;color:var(--amber);}
  .bar{height:7px;background:#EEF0F2;border-radius:6px;overflow:hidden;margin-top:8px;}
  .bar > i{display:block;height:100%;background:var(--teal);border-radius:6px;}
  .bar > i.hot{background:var(--accent);}
  .bar > i.gold{background:#E0A21C;}
  .money-hero{background:linear-gradient(135deg,#0E6E6E,#0A5757);color:#fff;border-radius:20px;padding:20px;margin-bottom:14px;}
  .money-hero .big{font-size:38px;}
  .money-hero .conv{display:flex;gap:8px;margin-top:14px;}
  .money-hero .conv div{flex:1;background:rgba(255,255,255,.13);border-radius:12px;padding:9px;text-align:center;}
  .money-hero .conv small{display:block;opacity:.8;font-size:11px;margin-bottom:2px;}
  .money-hero .conv b{font-size:15px;}
  .log-item{display:flex;align-items:center;gap:12px;}
  .dot{width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--lteal);}
  .log-item .d{flex:1;}
  .log-item .d b{font-size:15px;}
  .log-item .d span{display:block;font-size:12px;color:var(--gray);margin-top:1px;}
  .empty{text-align:center;color:var(--gray);padding:34px 10px;}
  .empty div{font-size:40px;margin-bottom:8px;}
  .goal-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .goal-top .dot{background:#FCF1DA;}
  .goal-top b{font-size:16px;}
  .fab{position:absolute;right:20px;bottom:88px;width:60px;height:60px;border-radius:20px;background:var(--accent);color:#fff;border:none;font-size:32px;box-shadow:0 8px 20px rgba(217,79,69,.5);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;}
  nav{position:absolute;bottom:0;left:0;right:0;height:76px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;}
  nav button{flex:1;border:none;background:none;color:var(--gray);font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding-bottom:12px;}
  nav button svg{width:22px;height:22px;}
  nav button.on{color:var(--teal);}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:60;display:none;}
  .scrim.show{display:block;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;padding:20px 18px 24px;z-index:70;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);max-height:90%;overflow:auto;}
  .sheet.show{transform:translateY(0);}
  .sheet h2{margin:2px 0 6px;font-size:19px;}
  label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.4px;}
  input,select{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:#fff;font-family:inherit;color:var(--dark);}
  input:focus,select:focus{outline:none;border-color:var(--teal);}
  .amt-input{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;}
  .amt-input span{padding:0 14px;font-size:19px;font-weight:800;color:var(--teal);background:var(--lteal);align-self:stretch;display:flex;align-items:center;}
  .amt-input input{border:none;border-radius:0;font-size:20px;font-weight:700;}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--teal);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:18px;}
  .btn.ghost{background:var(--lteal);color:var(--teal);margin-top:8px;}
  .btn.gold{background:#E0A21C;}
  .btn.sm{width:auto;padding:9px 16px;font-size:14px;margin-top:0;border-radius:12px;}
  .grid2{display:flex;gap:10px;}
  .grid2 > div{flex:1;}
  .del{color:var(--accent);background:none;border:none;font-size:13px;font-weight:700;cursor:pointer;}
  .hint{font-size:12px;color:var(--gray);margin:6px 0 2px;line-height:1.4;}
  .ghead{margin-top:16px;font-size:13px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;}
  .live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3ad29f;margin-right:5px;vertical-align:1px;}
  #login{position:absolute;inset:0;z-index:80;background:linear-gradient(160deg,var(--teal),var(--dteal));color:#fff;display:flex;flex-direction:column;justify-content:center;padding:34px 26px;}
  #login .lbrand{font-size:13px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:var(--cream);text-align:center;}
  #login h1{font-size:27px;font-weight:800;text-align:center;margin:10px 0 4px;line-height:1.2;}
  #login p.tag{text-align:center;color:#cfeaea;font-size:14px;margin:0 0 22px;}
  #login label{color:#bfe3e3;}
  #login input{background:rgba(255,255,255,.95);border:none;}
  #loginMsg{min-height:18px;font-size:13px;text-align:center;margin-top:12px;color:#ffe0b2;font-weight:600;}
  #login .link{display:block;text-align:center;color:#cfeaea;font-size:13px;margin-top:16px;text-decoration:underline;cursor:pointer;background:none;border:none;width:100%;}
  .btn.white{background:#fff;color:var(--teal);}
  .btn.outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);margin-top:10px;}
.login-logo{width:112px;height:73px;display:block;margin:0 auto 4px;}
  .brand{display:flex;align-items:center;gap:8px;}
  .hdr-logo{width:34px;height:22px;flex:none;}
  .phone.dark{--dark:#E8EDF0;--gray:#95A1AD;--line:#29333e;--bg:#0e1620;--cream:#0e1620;--lteal:#16303a;--teal:#1AA189;}
  .phone.dark .card{background:#17222e;box-shadow:0 2px 12px rgba(0,0,0,.35);}
  .phone.dark nav{background:#111a23;border-top-color:#26313c;}
  .phone.dark .sheet{background:#17222e;}
  .phone.dark input,.phone.dark select,.phone.dark .amt-input input{background:#0e1620;color:#E8EDF0;}
  .phone.dark input,.phone.dark select,.phone.dark .amt-input{border-color:#29333e;}
  .phone.dark .bar{background:#29333e;}
  .phone.dark .btn.ghost{background:#16303a;color:#8fe3cf;}
  img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-0.1em;display:inline-block;}
</style>
</head>

/* ---------- Currency helpers ---------- */
function curObj(code){ return CURRENCIES.find(c=>c.code===code); }
function symOf(code){ const c=curObj(code); return c?(c.sym||c.code):code; }
function nameOf(code){ const c=curObj(code); return c?c.name:code; }
function rate(code){ return S.rates[code]||DEFAULT_RATES[code]; }
function convert(a,from,to){ const rf=rate(from),rt=rate(to); if(!rf||!rt) return a; return a*rt/rf; }
function fmt(a){ const v=Math.round(a||0); return (v<0?"-":"")+symOf(S.home)+Math.abs(v).toLocaleString("en-US"); }
function fmtIn(a,code){ const v=Math.round(convert(a||0,S.home,code)); return (v<0?"-":"")+symOf(code)+Math.abs(v).toLocaleString("en-US"); }
function curOptions(sel){ const opt=c=>'<option value="'+c.code+'"'+(c.code===sel?' selected':'')+'>'+c.code+' — '+c.name+' ('+(c.sym||c.code)+')</option>'; const pinned=CURRENCIES.filter(c=>c.pin), rest=CURRENCIES.filter(c=>!c.pin).slice().sort((a,b)=>a.name.localeCompare(b.name)); return '<optgroup label="Popular">'+pinned.map(opt).join('')+'</optgroup><optgroup label="All currencies">'+rest.map(opt).join('')+'</optgroup>'; }
function setHome(code){ if(guard())return; if(!code||code===S.home) return; const f=rate(code)/rate(S.home); if(!f||!isFinite(f)) return; S.expenses.forEach(e=>{e.amt=e.amt*f;}); Object.keys(S.income).forEach(m=>S.income[m]*=f); Object.keys(S.planned).forEach(m=>Object.keys(S.planned[m]).forEach(c=>S.planned[m][c]*=f)); Object.keys(S.recurring).forEach(c=>S.recurring[c]*=f); (S.goals||[]).forEach(g=>{g.target*=f;g.saved*=f;g.monthly*=f;}); S.home=code; save(); render(); }

/* ---------- Month ---------- */
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
function monthLabel(m){const[y,mo]=m.split("-");return MN[+mo-1]+" "+y;}
function changeMonth(dir){let[y,mo]=S.month.split("-").map(Number);mo+=dir;if(mo<1){mo=12;y--;}if(mo>12){mo=1;y++;}S.month=y+"-"+String(mo).padStart(2,"0");save();render();}

/* ---------- Rollups (amounts stored in home currency) ---------- */
function monthExpenses(){return S.expenses.filter(e=>e.month===S.month);}
function actualByCat(){const o={};monthExpenses().forEach(e=>o[e.cat]=(o[e.cat]||0)+e.amt);return o;}
function totalActual(){return monthExpenses().reduce((a,e)=>a+e.amt,0);}
function plannedFor(cat){const c=CATS.find(x=>x.name===cat);if(c&&c.group==="fixed")return S.recurring[cat]||0;return (S.planned[S.month]||{})[cat]||0;}
function totalPlanned(){return CATS.reduce((a,c)=>a+plannedFor(c.name),0);}
function sectionPlanned(g){return groupCats(g).reduce((a,c)=>a+plannedFor(c.name),0);}
function sectionActual(g){const act=actualByCat();return groupCats(g).reduce((a,c)=>a+(act[c.name]||0),0);}
function income(){return S.income[S.month]||0;}
function billPaidState(cat){return !!((S.billPaid[S.month]||{})[cat]);}
function toggleBill(cat){if(guard())return;const mp=S.billPaid[S.month]=S.billPaid[S.month]||{};if(mp[cat]){delete mp[cat];S.expenses=S.expenses.filter(e=>!(e.auto&&e.month===S.month&&e.cat===cat));}else{mp[cat]=true;const amt=S.recurring[cat]||0;if(amt>0)S.expenses.push({id:Date.now()+Math.random(),month:S.month,date:S.month+"-01",desc:"Recurring bill",cat:cat,amt:amt,orig:amt,ccy:S.home,auto:true});}save();render();}
function autoBillFor(cat){return S.expenses.find(e=>e.auto&&e.month===S.month&&e.cat===cat);}function setVariableBill(cat,amt){if(guard())return;const mp=S.billPaid[S.month]=S.billPaid[S.month]||{};S.expenses=S.expenses.filter(e=>!(e.auto&&e.month===S.month&&e.cat===cat));if(amt>0){S.expenses.push({id:Date.now()+Math.random(),month:S.month,date:S.month+"-01",desc:"Monthly bill",cat:cat,amt:amt,orig:amt,ccy:S.home,auto:true});mp[cat]=true;}else{delete mp[cat];}save();render();}
function totalMonthlySavings(){return (S.goals||[]).reduce((a,g)=>a+(g.monthly||0),0);}
function totalSaved(){return (S.goals||[]).reduce((a,g)=>a+(g.saved||0),0);}

style="border:none;padding:2px 0"><span>🎯 Savings this month</span><b class="amt">'+fmt(sav)+'</b></div><div class="cat-meta" style="margin-top:2px">Set aside before spending — already taken out of Money left</div><button class="btn ghost" onclick="go(&#39;savings&#39;)" style="margin-top:10px">Manage savings goals</button></div>':'')+'';}
function viewLog(){const ex=monthExpenses().slice().sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);if(!ex.length)return '<div class="card"><div class="empty"><div>🧾</div>No spending logged yet for '+monthLabel(S.month)+'.<br>Tap + to add your first expense.</div></div>';let out="",cur="";ex.forEach(e=>{if(e.date!==cur){cur=e.date;out+='<div style="font-size:12px;font-weight:700;color:var(--gray);margin:14px 4px 6px">'+prettyDate(e.date)+'</div>';}const note=(e.ccy&&e.ccy!==S.home)?'<div class="cat-meta" style="text-align:right">'+(Math.round(e.orig*100)/100).toLocaleString("en-US")+' '+e.ccy+'</div>':'';out+='<div class="card" style="padding:10px 14px;margin-bottom:8px"><div class="log-item"><div class="dot">'+iconFor(e.cat)+'</div><div class="d"><b>'+(e.desc||e.cat)+'</b><span>'+e.cat+(e.place?" · 📍"+e.place:"")+(e.auto?' · recurring bill':'')+'</span></div><div style="text-align:right"><div class="amt">'+fmt(e.amt)+'</div>'+note+(e.auto?"":'<button class="del" onclick="openSheet(&#39;editexp&#39;,'+e.id+')" style="color:var(--gray)">Edit</button>')+'<button class="del" onclick="delExp('+e.id+')">Delete</button></div></div></div>';});return '<div class="money-hero" style="padding:16px 18px"><h3 style="color:#cfeaea;margin:0 0 4px">Spent in '+monthLabel(S.month).split(' ')[0]+'</h3><div class="big" style="font-size:30px">'+fmt(totalActual())+'</div><div class="sub" style="color:#bfe3e3;margin-top:4px">'+streakLine()+'</div></div>'+out;}

function donutSVG(){
var act=actualByCat();
var entries=Object.entries(act).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
var total=entries.reduce(function(s,e){return s+e[1];},0);
if(!total)return '<div class="card"><h3>Where your money went</h3><div class="empty" style="padding:22px 10px">Log some spending to see your breakdown.</div></div>';
var COLORS=["var(--teal)","#1CAE93","#E0A21C","#D94F45","#3B6FB0","#7A5EA8","#5B8C5A"];
var segs=entries.slice(0,6);var restV=entries.slice(6).reduce(function(s,e){return s+e[1];},0);if(restV>0)segs=segs.concat([["Other",restV]]);
var C=2*Math.PI*52,acc=0,circles="",legend="";
segs.forEach(function(e,i){var v=e[1],frac=v/total,len=frac*C,col=COLORS[i%COLORS.length];
circles+='<circle cx="70" cy="70" r="52" fill="none" stroke="'+col+'" stroke-width="22" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-acc).toFixed(2)+'" transform="rotate(-90 70 70)"/>';
acc+=len;
legend+='<div style="display:flex;align-items:center;padding:5px 0;font-size:13px"><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:'+col+';margin-right:8px;flex:none"></span><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e[0]+'</span><b style="margin:0 6px">'+fmt(v)+'</b><span style="color:var(--gray);width:34px;text-align:right;flex:none">'+Math.round(frac*100)+'%</span></div>';});
return '<div class="card"><h3>Where your money went · '+monthLabel(S.month).split(" ")[0]+'</h3><div style="display:flex;gap:12px;align-items:center"><svg width="132" height="132" viewBox="0 0 140 140" style="flex:none">'+circles+'<text x="70" y="65" text-anchor="middle" font-size="11" fill="var(--gray)">spent</text><text x="70" y="85" text-anchor="middle" font-size="15" font-weight="800" fill="var(--dark)">'+fmt(total)+'</text></svg><div style="flex:1;min-width:0">'+legend+'</div></div></div>';
}
function trendSVG(){
var y=+S.month.split("-")[0],m=+S.month.split("-")[1],keys=[];
for(var i=5;i>=0;i--){var yy=y,mm=m-i;while(mm<1){mm+=12;yy--;}keys.push(yy+"-"+String(mm).padStart(2,"0"));}
var totals=keys.map(function(k){return S.expenses.filter(function(e){return e.month===k;}).reduce(function(s,e){return s+e.amt;},0);});
var mx=Math.max(1,Math.max.apply(null,totals));
var W=320,H=155,pad=16,bw=32,base=H-26,gap=(W-pad*2-bw*6)/5;
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var bars="";
keys.forEach(function(k,i){var t=totals[i],bh=Math.max(Math.round(t/mx*(base-16)),2),x=pad+i*(bw+gap),cur=k===S.month,col=cur?"var(--teal)":"#9FD9CC";
bars+='<rect x="'+x.toFixed(1)+'" y="'+(base-bh)+'" width="'+bw+'" height="'+bh+'" rx="5" fill="'+col+'"/>';
if(t>0)bars+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(base-bh-6)+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+(cur?"var(--teal)":"var(--gray)")+'">'+fmt(t)+'</text>';
bars+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(base+16)+'" text-anchor="middle" font-size="10" fill="var(--gray)">'+MN[(+k.split("-")[1])-1]+'</text>';});
return '<div class="card"><h3>Spending by month</h3><svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block">'+bars+'</svg></div>';
}

function logStreak(){var days={};S.expenses.forEach(function(e){days[e.date]=1;});function key(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}var d=new Date();d.setHours(0,0,0,0);if(!days[key(d)]){d.setDate(d.getDate()-1);if(!days[key(d)])return 0;}var n=0;while(days[key(d)]){n++;d.setDate(d.getDate()-1);}return n;}
function streakLine(){var n=logStreak();return n>0?("🔥 "+n+"-day logging streak — keep it going!"):"Log an expense today to start a 🔥 streak";}
function monthReviewCard(){var me=monthExpenses();if(!me.length)return '';var spent=totalActual();var y=+S.month.split("-")[0],m=+S.month.split("-")[1];var pm=m-1,py=y;if(pm<1){pm=12;py--;}var pk=py+"-"+String(pm).padStart(2,"0");var lastSpent=S.expenses.filter(function(e){return e.month===pk;}).reduce(function(s,e){return s+e.amt;},0);var act=actualByCat();var topN="",topV=0;Object.keys(act).forEach(function(k){if(act[k]>topV){topV=act[k];topN=k;}});var eatCat=(S.cats.find(function(c){return c.name.toLowerCase().indexOf("eat")>=0;})||{}).name;var eatN=eatCat?me.filter(function(e){return e.cat===eatCat;}).length:0;var saved=totalMonthlySavings();var dtx="";if(lastSpent>0){var d=spent-lastSpent;var pct=Math.round(Math.abs(d)/lastSpent*100);dtx=d>0?("↑ "+pct+"% vs last month"):(d<0?("↓ "+pct+"% vs last month"):"same as last month");}var L=[];L.push('<div class="row"><span>💸 Spent</span><b class="amt">'+fmt(spent)+(dtx?' <span style="color:var(--gray);font-weight:400;font-size:12px">'+dtx+'</span>':'')+'</b></div>');if(topN)L.push('<div class="row"><span>🏆 Biggest category</span><b class="amt">'+topN+' · '+fmt(topV)+'</b></div>');L.push('<div class="row"><span>🧾 Expenses logged</span><b class="amt">'+me.length+'</b></div>');if(eatN)L.push('<div class="row"><span>☕ Ate out / coffee</span><b class="amt">'+eatN+' times</b></div>');if(saved>0)L.push('<div class="row"><span>🎯 Set aside</span><b class="amt">'+fmt(saved)+'</b></div>');var st=logStreak();if(st>1)L.push('<div class="row"><span>🔥 Streak</span><b class="amt">'+st+' days</b></div>');return '<div class="card"><h3>'+monthLabel(S.month)+' in review</h3>'+L.join("")+'</div>';}
function viewSummary(){const left=income()-totalActual(),tot=totalActual();const safe=income()-sectionPlanned("fixed")-totalMonthlySavings();const act=actualByCat();const top=Object.entries(act).sort((a,b)=>b[1]-a[1]).slice(0,5);const maxv=top.length?top[0][1]:1;const bars=top.map(([n,v])=>'<div class="row" style="border:none;padding:8px 0"><div style="flex:1"><div class="cat-name" style="font-size:14px">'+iconFor(n)+' '+n+'</div><div class="bar"><i style="width:'+Math.round(v/maxv*100)+'%"></i></div></div><div class="amt" style="margin-left:12px">'+fmt(v)+'</div></div>').join("")||'<div class="empty">No spending yet.</div>';const others=CURRENCIES.filter(c=>c.pin&&c.code!==S.home).slice(0,3);const conv=others.map(c=>'<div><small>'+c.code+'</small><b>'+fmtIn(safe,c.code)+'</b></div>').join("");return '<div class="money-hero"><h3 style="color:#cfeaea;margin:0 0 4px">Safe to spend</h3><div class="big">'+fmt(safe)+'</div><div class="sub" style="color:#bfe3e3">left for variable spending after bills &amp; savings</div><div class="conv">'+conv+'</div></div>'+monthReviewCard()+'<div class="card"><h3>This month at a glance</h3><div class="row"><span>Income</span><b class="amt">'+fmt(income())+'</b></div><div class="row"><span>🔁 Fixed bills</span><b class="amt">'+fmt(sectionActual("fixed"))+' <span style="color:var(--gray);font-weight:400">/ '+fmt(sectionPlanned("fixed"))+'</span></b></div><div class="row"><span>🛒 Variable spending</span><b class="amt">'+fmt(sectionActual("var"))+'</b></div><div class="row"><span>🎯 Savings this month</span><b class="amt">'+fmt(totalMonthlySavings())+'</b></div><div class="row"><span>Total spent</span><b class="amt">'+fmt(tot)+'</b></div><div class="row"><span>Money left</span><b class="amt" style="color:'+(left>=0?'var(--green)':'var(--accent)')+'">'+fmt(left)+'</b></div></div>'+donutSVG()+trendSVG();}
function prettyDate(d){const dt=new Date(d+"T00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}

function openSheet(kind,arg){if(locked()&&["add","editexp","planned","goal","bill","contrib","cats","catedit","trip"].indexOf(kind)>=0){kind="subscribe";arg=null;}const sh=document.getElementById("sheet");sh.innerHTML=kind==="add"?sheetAdd(arg):kind==="editexp"?sheetEditExp(arg):kind==="planned"?sheetPlanned():kind==="goal"?sheetGoal(arg):kind==="bill"?sheetBill(arg):kind==="cats"?sheetCats():kind==="catedit"?sheetCatEdit(arg):kind==="trip"?sheetTrip(arg):kind==="contrib"?sheetContribute(arg):kind==="welcome"?sheetWelcome():kind==="subscribe"?sheetSubscribe():sheetSettings();document.getElementById("scrim").classList.add("show");requestAnimationFrame(()=>sh.classList.add("show"));twemojify();}

function expenseForm(e,preCat){const editing=!!e;if(editing)preCat=e.cat;const _amt=editing?(Math.round(e.orig*100)/100):"";const _desc=editing?(e.desc||"").replace(/"/g,"&quot;"):"";const _place=editing?(e.place||"").replace(/"/g,"&quot;"):"";const _ccy=editing?e.ccy:defaultCcy();const opts=GROUPS.map(([g,title])=>'<optgroup label="'+title+'">'+groupCats(g).map(c=>'<option value="'+c.name+'"'+(c.name===preCat?' selected':'')+'>'+c.icon+' '+c.name+'</option>').join("")+'</optgroup>').join("");const today=editing?e.date:(S.month+"-"+String(Math.min(new Date().getDate(),28)).padStart(2,"0"));return '<h2>'+(editing?"Edit expense":"Add expense")+'</h2><label>Amount &amp; currency</label><div style="display:flex;gap:8px"><input id="a_amt" type="number" inputmode="decimal" placeholder="0" style="flex:1.3" value="'+_amt+'"><select id="a_ccy" style="flex:1">'+curOptions(_ccy)+'</select></div><div class="hint">Paid in another currency? Pick it here — we convert to '+S.home+' for you.</div><label>What did you buy?</label><input id="a_desc" placeholder="e.g. Dinner in Lisbon" value="'+_desc+'"><div class="grid2"><div><label>Category</label><select id="a_cat">'+opts+'</select></div><div><label>Date</label><input id="a_date" type="date" value="'+today+'"></div></div>'+'<label>Place / city (optional)</label><input id="a_place" list="a_places" placeholder="e.g. Lisbon" value="'+_place+'"><datalist id="a_places">'+S.expenses.reduce(function(a,e){var pl=(e.place||"").trim();if(pl&&a.indexOf(pl)<0)a.push(pl);return a;},[]).map(function(p){return "<option value=\""+p+"\">";}).join("")+'</datalist>'+'<button class="btn" onclick="'+(editing?"updateExp("+e.id+")":"addExp()")+'">'+(editing?"Save changes":"Save expense")+'</button><button class="btn ghost" onclick="closeSheet()">Cancel</button>';}
function addExp(){const raw=document.getElementById("a_amt").value;if(!raw||parseFloat(raw)<=0){document.getElementById("a_amt").focus();return;}const ccy=document.getElementById("a_ccy").value;S.lastCcy=ccy;const orig=parseFloat(raw);const amt=convert(orig,ccy,S.home);const d=document.getElementById("a_date").value||S.month+"-01";S.expenses.push({id:Date.now(),month:d.slice(0,7),date:d,desc:document.getElementById("a_desc").value.trim(),cat:document.getElementById("a_cat").value,amt:amt,orig:orig,ccy:ccy,place:(document.getElementById("a_place")?document.getElementById("a_place").value.trim():"")});save();closeSheet();if(tab!=="log"&&tab!=="budget")go("log");else render();}
function defaultCcy(){if(S.lastCcy)return S.lastCcy;var c={};(S.expenses||[]).forEach(function(e){if(e.ccy)c[e.ccy]=(c[e.ccy]||0)+1;});var best=null,n=0;for(var k in c){if(c[k]>n){n=c[k];best=k;}}return best||S.home;}

function updateExp(id){var e=S.expenses.find(function(x){return x.id===id;});if(!e)return;const raw=document.getElementById("a_amt").value;if(!raw||parseFloat(raw)<=0){document.getElementById("a_amt").focus();return;}const ccy=document.getElementById("a_ccy").value;S.lastCcy=ccy;const orig=parseFloat(raw);const d=document.getElementById("a_date").value||S.month+"-01";e.orig=orig;e.ccy=ccy;e.amt=convert(orig,ccy,S.home);e.date=d;e.month=d.slice(0,7);e.desc=document.getElementById("a_desc").value.trim();e.cat=document.getElementById("a_cat").value;e.place=(document.getElementById("a_place")?document.getElementById("a_place").value.trim():"");save();closeSheet();render();}
function sheetPlanned(){const p=S.planned[S.month]||{};const inp=(c,dataAttr,val)=>'<label style="margin-top:14px">'+c.icon+' '+c.name+'</label><div class="amt-input"><span>'+symOf(S.home)+'</span><input type="number" inputmode="decimal" '+dataAttr+'="'+c.name+'" placeholder="0" value="'+(val?Math.round(val):'')+'"></div>';const fixedInputs=groupCats("fixed").map(c=>inp(c,"data-rec",S.recurring[c.name])).join("");const varInputs=groupCats("var").map(c=>inp(c,"data-cat",p[c.name])).join("");return '<h2>Bills, budgets &amp; income</h2><div class="hint">Amounts in '+nameOf(S.home)+' ('+symOf(S.home)+'). Fixed bills repeat automatically every month.</div><label style="margin-top:14px">💰 Monthly income</label><div class="amt-input"><span>'+symOf(S.home)+'</span><input id="p_income" type="number" inputmode="decimal" value="'+(income()?Math.round(income()):'')+'" placeholder="0"></div><div class="ghead">Fixed bills (repeat monthly)</div>'+fixedInputs+'<div class="ghead">Variable budgets (this month)</div>'+varInputs+'<button class="btn" onclick="savePlanned()">Save</button>';}

function sheetGoal(id){const g=(S.goals||[]).find(x=>x.id===id)||{name:"",icon:"⭐",target:"",saved:0,monthly:""};const editing=!!id;const sy=symOf(S.home);return '<h2>'+(editing?'Edit goal':'New savings goal')+'</h2><label>Goal name</label><input id="g_name" value="'+(g.name||'')+'" placeholder="e.g. Emergency fund"><div class="grid2"><div><label>Target ('+sy+')</label><div class="amt-input"><span>'+sy+'</span><input id="g_target" type="number" inputmode="decimal" value="'+(g.target?Math.round(g.target):'')+'" placeholder="0"></div></div><div><label>Per month ('+sy+')</label><div class="amt-input"><span>'+sy+'</span><input id="g_monthly" type="number" inputmode="decimal" value="'+(g.monthly?Math.round(g.monthly):'')+'" placeholder="0"></div></div></div><label>Emoji (optional)</label><input id="g_icon" value="'+(g.icon||'')+'" maxlength="2" placeholder="⭐">'+(editing?'<label>Saved so far ('+sy+')</label><div class="amt-input"><span>'+sy+'</span><input id="g_saved" type="number" inputmode="decimal" value="'+Math.round(g.saved||0)+'"></div>':'')+'<button class="btn gold" onclick="saveGoal('+(id||0)+')">'+(editing?'Save goal':'Create goal')+'</button>'+(editing?'<button class="btn ghost" onclick="deleteGoal('+id+')" style="color:var(--accent)">Delete goal</button>':'<button class="btn ghost" onclick="closeSheet()">Cancel</button>');}

var hasNo=(byPlace["No City"]||0)>0;var pentries=Object.entries(byPlace).sort(function(a,b){return b[1]-a[1];});if(S.hideNoCity)pentries=pentries.filter(function(e){return e[0]!=="No City";});var ptot=pentries.reduce(function(s,e){return s+e[1];},0);var noCityToggle=hasNo?'<div style="text-align:right;margin-top:8px"><span class="cat-meta" style="cursor:pointer;text-decoration:underline" onclick="toggleNoCity()">'+(S.hideNoCity?"Show ‘No City’":"Hide ‘No City’")+'</span></div>':"";

else{var COL=["#0E6E6E","#1CAE93","#E0A21C","#D94F45","#3B6FB0","#7A5EA8","#5B8C5A"];var rws=pentries.slice(0,7).map(function(e,i){var frac=e[1]/ptot;var col=COL[i%COL.length];return '<div style="padding:7px 0"><div style="display:flex;justify-content:space-between;font-size:14px"><span>📍 '+e[0]+'</span><b>'+fmt(e[1])+' <span style="color:var(--gray);font-weight:400">'+Math.round(frac*100)+'%</span></b></div><div class="bar" style="margin-top:5px"><i style="width:'+Math.round(frac*100)+'%;background:'+col+'"></i></div></div>';}).join("");placesCard='<div class="card"><h3>Places this month · '+monthLabel(S.month).split(" ")[0]+'</h3>'+rws+noCityToggle+'</div>';}
var trips=S.trips||[];
var tc=trips.map(function(t){var sp=tripSpent(t);var pct=t.budget>0?Math.min(100,Math.round(sp/t.budget*100)):0;var over=sp>t.budget&&t.budget>0;return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><b style="font-size:16px">✈️ '+t.name+'</b><div class="cat-meta">'+(t.place?"📍 "+t.place:"no city set")+'</div></div><button class="btn ghost sm" onclick="openSheet(\'trip\','+t.id+')" style="margin-top:0">Edit</button></div><div style="display:flex;justify-content:space-between;font-size:14px;margin-top:10px"><b>'+fmt(sp)+'</b><span style="color:var(--gray)">of '+fmt(t.budget)+'</span></div><div class="bar" style="margin-top:6px"><i class="'+(over?"hot":"")+'" style="width:'+pct+'%"></i></div><div class="cat-meta" style="margin-top:6px">'+(over?("⚠ "+fmt(sp-t.budget)+" over"):(fmt(Math.max(0,t.budget-sp))+" left"))+'</div></div>';}).join("")||'<div class="card"><div class="empty"><div>🧳</div>No trips yet.<br>Set a budget for a city and track it as you go.</div></div>';
return '<div class="money-hero" style="background:linear-gradient(135deg,#3B6FB0,#274B7A)"><h3 style="color:#d9e6f5;margin:0 0 4px">Trips &amp; places</h3><div class="sub" style="color:#cfe0f2">See where you spend, and budget by city</div></div>'+placesCard+'<div class="ghead" style="margin:6px 4px 8px">Trip budgets</div>'+tc;
}
function sheetContribute(id){var g=(S.goals||[]).find(function(x){return x.id===id;});if(!g)return sheetSettings();return '<h2>'+(g.icon||'⭐')+' Add to '+g.name+'</h2><div class="hint">Saved so far: '+fmt(g.saved||0)+' of '+fmt(g.target||0)+'. Put in any amount this month — your '+fmt(g.monthly||0)+'/mo plan is just a suggestion.</div><label>Amount to add ('+symOf(S.home)+')</label><div class="amt-input"><span>'+symOf(S.home)+'</span><input id="cg_amt" type="number" inputmode="decimal" value="'+(g.monthly?Math.round(g.monthly):'')+'" placeholder="0"></div><button class="btn gold" onclick="saveContribute('+id+')">Add to savings</button><button class="btn ghost" onclick="closeSheet()">Cancel</button>';}
function saveContribute(id){var g=(S.goals||[]).find(function(x){return x.id===id;});if(!g)return;var v=parseFloat(document.getElementById("cg_amt").value)||0;g.saved=Math.max(0,(g.saved||0)+v);save();closeSheet();render();}
function downloadFile(name,content,type){var b=new Blob([content],{type:type});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(u);a.remove();},100);}
function exportJSON(){downloadFile("globalbound-backup-"+S.month+".json",JSON.stringify(S,null,2),"application/json");}
function exportCSV(){var rows=[["Date","Category","Description","Place","Amount("+S.home+")","Original amount","Paid in"]];S.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(e){rows.push([e.date,e.cat,e.desc||"",e.place||"",Math.round((e.amt||0)*100)/100,(e.orig!=null?e.orig:""),e.ccy||""]);});var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");downloadFile("globalbound-expenses.csv",csv,"text/csv");}
async function deleteAccount(){if(!confirm("Delete your account data permanently? This can't be undone.")){return;}if(!confirm("Really delete everything — budgets, expenses, savings, trips?")){return;}if(CLOUD&&USER&&sb){try{await sb.from("budgets").delete().eq("user_id",USER.id);}catch(e){}try{await sb.auth.signOut();}catch(e){}USER=null;closeSheet();showLogin();}else{try{localStorage.removeItem("borderless");}catch(e){}closeSheet();startDemo();}}
function sheetWelcome(){return '<h2>👋 Welcome to Global Bound</h2><div class="hint">Two quick things and you\'re set — you can change both anytime in Settings.</div><label>Your home currency</label><select id="w_home">'+curOptions(S.home)+'</select><div class="hint" style="margin-top:6px">Everything totals in this currency. Pick the one you think in.</div><label>Monthly income (after tax) — optional</label><div class="amt-input"><span>'+symOf(S.home)+'</span><input id="w_income" type="number" inputmode="decimal" placeholder="0"></div><button class="btn" onclick="finishWelcome()">Start budgeting →</button>';}
function finishWelcome(){var hc=document.getElementById("w_home").value;if(hc&&hc!==S.home)setHome(hc);var v=parseFloat(document.getElementById("w_income").value)||0;if(v>0)S.income[S.month]=v;S.onboarded=true;save();closeSheet();render();}
function maybeWelcome(){if(!S.onboarded&&(!S.expenses||S.expenses.length===0)&&(!S.income||!Object.keys(S.income).length)){openSheet("welcome");}}

async function loadSub(){SUB=null;if(!(CLOUD&&USER&&sb))return;try{const {data}=await sb.from("subscriptions").select("*").eq("user_id",USER.id).maybeSingle();if(data)SUB=data;}catch(e){}}
function subActive(){if(!LS.enforce)return true;if(!CLOUD)return true;if(!SUB)return false;var now=Date.now();var st=SUB.status;if(st==="active"||st==="past_due")return true;if(st==="on_trial")return !SUB.trial_ends_at||new Date(SUB.trial_ends_at).getTime()>now;if(SUB.ends_at&&new Date(SUB.ends_at).getTime()>now)return true;return false;}
function locked(){return !subActive();}
function guard(){if(locked()){openSheet("subscribe");return true;}return false;}
function trialDaysLeft(){if(SUB&&SUB.status==="on_trial"&&SUB.trial_ends_at){return Math.max(0,Math.ceil((new Date(SUB.trial_ends_at).getTime()-Date.now())/86400000));}return null;}
function updateSubBanner(){var b=document.getElementById("banner");if(!b)return;if(!CLOUD)return;if(!LS.enforce){b.style.display="none";b.style.background="";return;}if(!SUB){b.style.display="none";return;}var d=trialDaysLeft();if(d!==null){b.style.display="block";b.style.background="#0E6E6E";b.innerHTML='✨ Free trial — '+d+' day'+(d===1?'':'s')+' left. <span onclick="openSheet(&#39;subscribe&#39;)" style="text-decoration:underline;cursor:pointer">Subscribe</span>';}else if(locked()){b.style.display="block";b.style.background="#9c3535";b.innerHTML='🔒 Read-only — subscription ended. Your data is safe. <span onclick="openSheet(&#39;subscribe&#39;)" style="text-decoration:underline;cursor:pointer">Reactivate</span>';}else{b.style.display="none";b.style.background="";}}
function subLine(){if(!CLOUD)return "";if(!SUB){return LS.enforce?"No subscription record yet.":"";}var st=SUB.status;var d=trialDaysLeft();if(d!==null)return "Free trial — "+d+" day"+(d===1?"":"s")+" left";if(st==="active")return "Active"+(SUB.plan?" · "+SUB.plan:"")+(SUB.renews_at?" · renews "+String(SUB.renews_at).slice(0,10):"");if(st==="cancelled")return "Cancelled · access until "+(SUB.ends_at?String(SUB.ends_at).slice(0,10):"period end");if(st==="expired")return "Ended · read-only";if(st==="past_due")return "Payment past due";return st||"";}
function subSection(){if(!CLOUD)return "";var line=subLine();var label=(SUB&&(SUB.status==="active"||SUB.status==="cancelled"||SUB.status==="past_due"))?"Manage subscription":"View plans";return '<div class="ghead">Subscription</div>'+(line?'<div class="hint">'+line+'</div>':'')+'<button class="btn ghost" onclick="openSheet(&#39;subscribe&#39;)" style="margin-top:6px">'+label+'</button>';}
function sheetSubscribe(){var canManage=SUB&&(SUB.status==="active"||SUB.status==="cancelled"||SUB.status==="past_due");return '<h2>Unlock Global Bound</h2><div class="hint">Keep budgeting across all your devices. Adding and editing stay unlocked while your plan is active — and your data is always safe and exportable, even if you pause.</div>'+'<div class="card" style="padding:14px"><div><b>Annual</b><div class="cat-meta">$24 / year · about $2 a month · best value</div></div><button class="btn" onclick="openCheckout(&#39;annual&#39;)" style="margin-top:10px">Choose annual</button></div>'+'<div class="card" style="padding:14px"><div><b>Monthly</b><div class="cat-meta">$2.99 / month · cancel anytime</div></div><button class="btn ghost" onclick="openCheckout(&#39;monthly&#39;)" style="margin-top:10px">Choose monthly</button></div>'+(canManage?'<button class="btn ghost" onclick="openPortal()">Manage my subscription</button>':'')+'<div class="hint" style="margin-top:10px">Secure checkout by Lemon Squeezy. Cancel anytime; if your plan ends, Global Bound switches to read-only and your data stays put until you resubscribe.</div><button class="btn ghost" onclick="closeSheet()">Close</button>';}
function openCheckout(plan){var url=plan==="monthly"?LS.monthlyUrl:LS.annualUrl;if(!url){alert("Checkout isn't set up yet.");return;}var join=url.indexOf("?")>=0?"&":"?";var uid=USER?USER.id:"",em=USER?USER.email:"";var full=url+join+"checkout[custom][user_id]="+encodeURIComponent(uid)+"&checkout[email]="+encodeURIComponent(em);window.open(full,"_blank");}
function openPortal(){var u=(SUB&&SUB.portal_url)?SUB.portal_url:LS.portalUrl;if(!u){alert("No subscription to manage yet.");return;}window.open(u,"_blank");}

function sheetSettings(){
  const live=S.liveRates!==false;
  const upd=S.ratesUpdated?new Date(S.ratesUpdated).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'not yet';
  const acct = CLOUD && USER
    ? '<div class="ghead">Account</div><div class="hint">Signed in as '+USER.email+'</div><button class="btn ghost" onclick="doSignOut()">Sign out</button><button class="btn ghost" onclick="deleteAccount()" style="color:var(--accent)">Delete my account &amp; data</button>'
    : '<div class="ghead">Account</div><div class="hint">Demo mode — data saved on this device only. Sign in to sync to the cloud.</div>';
  return '<h2>Settings</h2>'+subSection()
    +'<div class="ghead">Home currency</div><div class="hint">Everything is budgeted and totaled in this currency. Changing it converts your existing amounts.</div>'
    +'<select id="home_sel" onchange="setHome(this.value);openSheet(\'settings\')">'+curOptions(S.home)+'</select>'
    +'<div class="ghead">Exchange rates</div><div class="hint">'+(live?'Update automatically. Free rates refresh about once a day.':'Paused — using the last saved rates.')+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:6px"><button class="btn sm" style="flex:1;margin-top:0;'+(live?'background:#E0A21C;color:#fff':'background:var(--lteal);color:var(--teal)')+'" onclick="setLive(true)">Automatic</button><button class="btn sm" style="flex:1;margin-top:0;'+(!live?'background:var(--teal);color:#fff':'background:var(--lteal);color:var(--teal)')+'" onclick="setLive(false)">Paused</button></div>'
    +'<div class="row" style="margin-top:10px"><span class="cat-meta"><span class="live"></span>'+(S.ratesError?'Offline — using saved rates':'Updated '+upd)+'</span></div>'
    +'<button class="btn gold" onclick="refreshRates()">↻ Refresh rates now</button>'
    +'<div class="ghead">Appearance</div><div style="display:flex;gap:8px;margin-top:6px"><button class="btn sm" style="flex:1;margin-top:0;'+(!S.dark?'background:var(--teal);color:#fff':'background:var(--lteal);color:var(--teal)')+'" onclick="setDark(false)">☀ Light</button><button class="btn sm" style="flex:1;margin-top:0;'+(S.dark?'background:var(--teal);color:#fff':'background:var(--lteal);color:var(--teal)')+'" onclick="setDark(true)">🌙 Dark</button></div>'+'<div class="ghead">Categories</div><button class="btn ghost" onclick="openSheet(\'cats\')">Manage categories</button>'+'<div class="ghead">Your data</div><div class="hint">Download everything anytime — your data is always yours.</div><div style="display:flex;gap:8px"><button class="btn ghost sm" style="flex:1;margin-top:0" onclick="exportCSV()">Expenses (CSV)</button><button class="btn ghost sm" style="flex:1;margin-top:0" onclick="exportJSON()">Full backup</button></div>'+acct;
}
function setLive(on){S.liveRates=on;save();if(on)fetchRates();openSheet("settings");render();}
function setDark(v){S.dark=v;save();applyTheme();openSheet("settings");}function applyTheme(){var ph=document.querySelector(".phone");if(ph)ph.classList.toggle("dark",!!S.dark);}function refreshRates(){const el=document.getElementById("rateStatus");if(el)el.textContent="● Updating live rates…";fetchRates(true);}

/* ---------- Live exchange rates (base USD, ~160 currencies) ---------- */
async function fetchRates(reopen){
  if(S.liveRates===false){updateRateStatus();return;}
  try{
    const res=await fetch("https://open.er-api.com/v6/latest/USD",{cache:"no-store"});
    const j=await res.json();
    if(j&&j.rates&&j.rates.USD){ S.rates=j.rates; S.ratesUpdated=Date.now(); S.ratesError=false; save(); render(); if(reopen&&document.querySelector(".sheet.show"))openSheet("settings"); }
    else throw 0;
  }catch(e){ S.ratesError=true; save(); }
  updateRateStatus();
}
function updateRateStatus(){const el=document.getElementById("rateStatus");if(!el)return;if(S.liveRates===false){el.innerHTML="Rates paused · tap to resume";return;}if(S.ratesError&&!S.ratesUpdated){el.innerHTML="⚠ Live rates unavailable · using saved";return;}const t=S.ratesUpdated?new Date(S.ratesUpdated).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}):'…';el.innerHTML=(S.ratesError?"⚠ offline · ":'<span class="live"></span>Live rates · ')+"updated "+t;}
function startRates(){ fetchRates(); clearInterval(ratesTimer); ratesTimer=setInterval(()=>{ if(S.liveRates!==false) fetchRates(); }, 60*60*1000); }

/* ---------- Auth ---------- */
function lmsg(t){ document.getElementById("loginMsg").textContent=t||""; }
function showLogin(){ document.getElementById("login").style.display="flex"; }
function showApp(){ document.getElementById("login").style.display="none"; }
async function doSignIn(){ if(!sb){ lmsg("App isn't connected yet — add your Supabase keys."); return; } const email=document.getElementById("li_email").value.trim(), pass=document.getElementById("li_pass").value; lmsg("Signing in…"); const {error}=await sb.auth.signInWithPassword({email,password:pass}); if(error) lmsg(error.message); }
async function doSignUp(){ if(!sb){ lmsg("App isn't connected yet — add your Supabase keys."); return; } const email=document.getElementById("li_email").value.trim(), pass=document.getElementById("li_pass").value; if(pass.length<6){ lmsg("Use a password of at least 6 characters."); return; } lmsg("Creating your account…"); const {data,error}=await sb.auth.signUp({email,password:pass}); if(error) lmsg(error.message); else if(!data.session) lmsg("Account created! Check your email to confirm, then sign in."); }
async function doSignOut(){ closeSheet(); if(sb) await sb.auth.signOut(); USER=null; showLogin(); }
function startDemo(){ CLOUD=false; S=normalize(localLoad()); const b=document.getElementById("banner"); b.style.display="block"; b.textContent="Demo mode — data saved on this device only"; showApp(); render(); startRates(); maybeWelcome(); }
async function onLogin(user){ USER=user; CLOUD=true; document.getElementById("banner").style.display="none"; try{ const {data}=await sb.from("budgets").select("data").eq("user_id",user.id).maybeSingle(); if(data&&data.data&&Object.keys(data.data).length){ S=normalize(data.data); } else { S=defaultState(); await sb.from("budgets").upsert({user_id:user.id,data:S,updated_at:new Date().toISOString()}); } }catch(e){ S=defaultState(); } try{await loadSub();}catch(e){} showApp(); render(); startRates(); maybeWelcome(); }

/* ---------- Boot ---------- */
document.getElementById("loginBrand").textContent=APP_NAME;
document.getElementById("hdrBrand").textContent=APP_NAME;
(function boot(){
  const configured = CFG.url && CFG.url.indexOf("http")===0 && CFG.key && CFG.key.length>20;
  if(configured && window.supabase){
    sb=window.supabase.createClient(CFG.url, CFG.key);
    sb.auth.getSession().then(({data})=>{ if(data.session) onLogin(data.session.user); else showLogin(); });
    sb.auth.onAuthStateChange((_e,session)=>{ if(session&&(!USER||USER.id!==session.user.id)) onLogin(session.user); });
    window.addEventListener("focus",function(){ if(CLOUD&&USER&&sb){ loadSub().then(function(){ if(document.getElementById("login").style.display==="none") render(); }); } });
  } else { startDemo(); }
})();
</script>
